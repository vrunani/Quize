
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .page {
    display: flex;
  width: 100%;
  min-height: 100vh; /* full screen height */
  flex-wrap: wrap; /* allows stacking on small screens */
  font-family: var(--font-sans);
  border-radius: 16px;
  overflow: hidden;
  }

  /* LEFT — white with teal/blue interactive art */
  .left-panel {
    flex: 1 1 55%;
  min-height: 400px;
    background: #fff;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #artCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .left-brand {
    position: relative;
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  .left-brand-name {
    font-weight: 500;
    color: #07585b;
    letter-spacing: -1px;
    font-size: clamp(2rem, 6vw, 4rem);
    line-height: 1;
  }

  .left-brand-tag {
     font-size: clamp(0.8rem, 2vw, 1rem);
    color: #03969d;
    margin-top: 8px;
    opacity: 0.85;
  }

  .left-stats {
    display: flex;
    gap: 28px;
    justify-content: center;
    margin-top: 28px;
  }

  .stat-item { text-align: center; }
  .stat-num { font-size: 26px; font-weight: 500; color: #07585b; line-height: 1; }
  .stat-lbl { font-size: 11px; color: #03969d; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.8; }

  /* RIGHT — purple gradient */
  .right-panel {
    flex: 1 1 45%;
  min-width: 320px;
  padding: clamp(1.5rem, 4vw, 3rem);
    background: linear-gradient(160deg, #caabd5 0%, #83749f 60%, #5a4d7a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 2.8rem;
    position: relative;
    overflow: hidden;
  }

  /* subtle decorative circles on right panel */
  .rp-deco {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .rp-deco-1 {
    width: 260px; height: 260px;
    border: 1px solid rgba(255,255,255,0.12);
    top: -80px; right: -80px;
  }
  .rp-deco-2 {
    width: 180px; height: 180px;
    border: 1px solid rgba(255,255,255,0.1);
    bottom: -60px; left: -50px;
  }
  .rp-deco-3 {
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.07);
    top: 55%; right: -20px;
  }

  /* Form elements */
  .form-logo {
    width: 46px; height: 46px;
    background: rgba(255,255,255,0.18);
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1rem;
    border: 1px solid rgba(255,255,255,0.25);
  }

  .form-title {
     font-size: clamp(1.3rem, 3vw, 2rem);
    font-weight: 500;
    color: #fff;
    margin-bottom: 4px;
    text-align: center;
  }

  .form-sub {
    font-size: clamp(0.8rem, 2vw, 1rem);
    color: rgba(255,255,255,0.7);
    text-align: center;
    margin-bottom: 2rem;
  }

  .field-wrap { width: 100%; margin-bottom: 1.1rem; }

  .field-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .qinput {
    width: 100%;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    color: #fff;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .qinput::placeholder { color: rgba(255,255,255,0.45); }
  .qinput:focus {
    border-color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.22);
  }

  .pw-wrap { position: relative; }
  .pw-wrap .qinput { padding-right: 44px; }

  .eye-btn {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: #fff; }

  .role-group { display: flex; gap: 8px; width: 100%; }

  .role-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    transition: all 0.22s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .role-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }
  .role-btn:hover::after { background: rgba(255,255,255,0.06); }

  .role-btn.active {
    background: rgba(255,255,255,0.28);
    border-color: rgba(255,255,255,0.6);
    color: #fff;
  }

  .sign-btn {
    width: 100%;
    padding: 12px 0;
    border-radius: 10px;
    border: none;
    background: #fff;
    color: #83749f;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 1.4rem;
    letter-spacing: 0.02em;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
  }
  .sign-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  }
  .sign-btn:active { transform: scale(0.98); }

  .form-footer {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    text-align: center;
    margin-top: 1.2rem;
  }
  .form-footer a { color: rgba(255,255,255,0.9); text-decoration: none; font-weight: 500; }
  .form-footer a:hover { text-decoration: underline; }

  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 1rem 0; width: 100%;
  }
  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.2); }
  .divider-text { font-size: 12px; color: rgba(255,255,255,0.5); }

  .social-row { display: flex; gap: 8px; width: 100%; }
  .social-btn {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 0;
    border-radius: 9px;
    border: 1.5px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.1);
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .social-btn:hover {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.4);
    color: #fff;
  }

  /* Animated input shake on empty submit */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-6px); }
    40%,80% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.4s ease; }

  /* Ripple on sign-in button */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(131,116,159,0.25);
    transform: scale(0);
    animation: rippleAnim 0.55s linear;
    pointer-events: none;
  }
  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  .sign-btn { position: relative; overflow: hidden; }
@media (max-width: 768px) {
  .page {
    flex-direction: column;
  }

  .left-panel,
  .right-panel {
    width: 100%;
    min-width: 100%;
  }

  .right-panel {
    padding: 2rem;
  }

  .left-brand-name {
    font-size: 2.5rem;
  }
}
  /* Focus ring visible */
  .qinput:focus-visible { box-shadow: 0 0 0 3px rgba(255,255,255,0.2); }
</style>

<div class="page">

  <!-- LEFT — white, interactive canvas -->
  <div class="left-panel">
    <canvas id="artCanvas"></canvas>
    <div class="left-brand">
      <div class="left-brand-name">Quizely</div>
      <div class="left-brand-tag">Learn smarter. Score higher.</div>
      
    </div>
  </div>

  <!-- RIGHT — purple form -->
  <div class="right-panel">
    <div class="rp-deco rp-deco-1"></div>
    <div class="rp-deco rp-deco-2"></div>
    <div class="rp-deco rp-deco-3"></div>

    <div class="form-logo">
      <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
    </div>

    <div class="form-title">Welcome back</div>
    <div class="form-sub">Sign in to continue learning</div>

    <div class="field-wrap">
      <label class="field-label">Email</label>
      <input class="qinput" id="emailField" type="email" placeholder="you@school.edu"/>
    </div>

    <div class="field-wrap">
      <label class="field-label">Password</label>
      <div class="pw-wrap">
        <input class="qinput" type="password" placeholder="••••••••" id="pwField"/>
        <button class="eye-btn" onclick="togglePw(this)" type="button" aria-label="Toggle password">
          <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field-wrap" style="margin-bottom:0">
      <label class="field-label">I am a</label>
      <div class="role-group">
        <button class="role-btn active" id="rStudent" onclick="setRole('student')">Student</button>
        <button class="role-btn" id="rTeacher" onclick="setRole('teacher')">Teacher</button>
      </div>
    </div>

    <button class="sign-btn" id="signBtn" onclick="handleLogin(event)">Sign in</button>

   
  </div>
</div>

<script>
/* ── Password toggle ── */
function togglePw(btn) {
  var f = document.getElementById('pwField');
  var icon = btn.querySelector('svg');
  if (f.type === 'password') {
    f.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.8"/>';
  } else {
    f.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

/* ── Role switch ── */
function setRole(role) {
  document.getElementById('rStudent').classList.toggle('active', role === 'student');
  document.getElementById('rTeacher').classList.toggle('active', role === 'teacher');
}

/* ── Login with ripple + shake ── */
function handleLogin(e) {
  var btn = document.getElementById('signBtn');
  var email = document.getElementById('emailField');
  var pw = document.getElementById('pwField');

  var ripple = document.createElement('span');
  ripple.className = 'ripple';
  var rect = btn.getBoundingClientRect();
  var size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
  btn.appendChild(ripple);
  setTimeout(function(){ ripple.remove(); }, 600);

  if (!email.value || !pw.value) {
    if (!email.value) { email.classList.add('shake'); setTimeout(function(){ email.classList.remove('shake'); }, 500); }
    if (!pw.value) { pw.classList.add('shake'); setTimeout(function(){ pw.classList.remove('shake'); }, 500); }
    return;
  }

  btn.textContent = 'Signing in…';
  btn.style.opacity = '0.8';
  setTimeout(function(){ btn.textContent = 'Sign in'; btn.style.opacity = '1'; }, 1800);
}

/* ── Counter animation ── */
function animateCount(el, target, suffix) {
  var start = 0;
  var dur = 1600;
  var step = 16;
  var inc = target / (dur / step);
  var timer = setInterval(function() {
    start += inc;
    if (start >= target) { start = target; clearInterval(timer); }
    el.textContent = Math.round(start) + suffix;
  }, step);
}

setTimeout(function() {
  animateCount(document.getElementById('ctr1'), 50, 'k+');
  animateCount(document.getElementById('ctr2'), 8, 'k+');
  animateCount(document.getElementById('ctr3'), 200, '+');
}, 400);

/* ── Interactive canvas — floating teal/blue nodes + mouse repel ── */
var canvas = document.getElementById('artCanvas');
var ctx = canvas.getContext('2d');
var mouse = { x: -999, y: -999 };
var nodes = [];
var W, H;

function resize() {
  W = canvas.width = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
}
resize();

var colors = ['#6bc5c6','#03969d','#07585b','#caabd5','#83749f'];

for (var i = 0; i < 38; i++) {
  nodes.push({
    x: Math.random() * (W||500),
    y: Math.random() * (H||600),
    vx: (Math.random()-0.5)*0.5,
    vy: (Math.random()-0.5)*0.5,
    r: 3 + Math.random()*5,
    color: colors[Math.floor(Math.random()*colors.length)],
    alpha: 0.3 + Math.random()*0.5
  });
}

canvas.parentElement.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});
canvas.parentElement.addEventListener('mouseleave', function() {
  mouse.x = -999; mouse.y = -999;
});

function draw() {
  if (canvas.offsetWidth !== W || canvas.offsetHeight !== H) resize();
  ctx.clearRect(0, 0, W, H);

  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    var dx = n.x - mouse.x;
    var dy = n.y - mouse.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 90) {
      var force = (90 - dist) / 90 * 1.5;
      n.vx += (dx/dist)*force*0.06;
      n.vy += (dy/dist)*force*0.06;
    }
    n.vx *= 0.97;
    n.vy *= 0.97;
    n.x += n.vx;
    n.y += n.vy;
    if (n.x < 0) { n.x = 0; n.vx *= -1; }
    if (n.x > W) { n.x = W; n.vx *= -1; }
    if (n.y < 0) { n.y = 0; n.vy *= -1; }
    if (n.y > H) { n.y = H; n.vy *= -1; }
  }

  for (var i = 0; i < nodes.length; i++) {
    for (var j = i+1; j < nodes.length; j++) {
      var dx = nodes[i].x - nodes[j].x;
      var dy = nodes[i].y - nodes[j].y;
      var d = Math.sqrt(dx*dx+dy*dy);
      if (d < 110) {
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = 'rgba(3,150,157,' + (0.18*(1-d/110)) + ')';
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }
    }
  }

  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
    ctx.fillStyle = n.color;
    ctx.globalAlpha = n.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(draw);
}
draw();
</script>
