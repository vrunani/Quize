# 1. Port Configuration
# This tells Spring to use the port Render provides, or 8080 locally
server.port=${PORT:8080}
server.address=0.0.0.0

# 2. PostgreSQL Database Connection
# We use Render's environment variable for the URL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 'update' will create tables automatically if they don't exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# 4. Initialization (Optional)
# Set to 'never' if you want Hibernate (above) to handle the tables
spring.sql.init.mode=never

# 5. Logging & Security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
